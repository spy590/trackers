<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trackers</title>
<style>
  :root{ color-scheme: light; }
  body{margin:0;background:#f4f6f8;color:#10221b;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;}
  .wrap{max-width:680px;margin:0 auto;padding:48px 20px;}
  h1{font-size:26px;letter-spacing:-.3px;margin:0 0 6px;}
  p.sub{color:#5d6b66;margin:0 0 28px;font-size:14px;}
  ul{list-style:none;padding:0;margin:0;display:grid;gap:12px;}
  a.card{display:block;text-decoration:none;color:inherit;background:#fff;
    border:1px solid #e3e8e6;border-radius:14px;padding:16px 18px;
    box-shadow:0 1px 3px rgba(16,34,27,.08),0 1px 2px rgba(16,34,27,.04);
    transition:transform .12s ease, box-shadow .12s ease;}
  a.card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,34,27,.12);}
  a.card .t{font-weight:700;font-size:16px;color:#067a46;}
  a.card .d{font-size:13px;color:#5d6b66;margin-top:2px;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Trackers</h1>
    <p class="sub">Self-contained HTML trackers.</p>
    <ul>
      <li>
        <a class="card" href="world-cup-tracker-2026.html">
          <div class="t">World Cup 2026 Tracker</div>
          <div class="d">Groups, schedule, and standings for the 2026 FIFA World Cup.</div>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
